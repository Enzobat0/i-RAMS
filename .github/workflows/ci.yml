name: i-RAMS Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      # We need a PostGIS instance for Django tests
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: irams_test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils libproj-dev gdal-bin libpq-dev

      - name: Install Python Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Django Tests
        env:
          DATABASE_URL: postgis://postgres:postgres@localhost:5432/irams_test_db
        run: |
          cd backend
          python manage.py test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build