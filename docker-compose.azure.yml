version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      - POSTGRES_DB=irams_db
      - POSTGRES_USER=irams_admin
      - POSTGRES_PASSWORD=secure_password_123

  backend:
    image: iramsregistry.azurecr.io/backend:latest
    environment:
      - DATABASE_URL=postgres://irams_admin:secure_password_123@db:5432/irams_db
      - DEBUG=0
    depends_on:
      - db

  frontend:
    image: iramsregistry.azurecr.io/frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend